<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Sheep Jump Simulator</title>
    <style>
        body { background: linear-gradient(to bottom, #87CEEB, #E0F7FA); color: #333; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: 'Arial', sans-serif; overflow: hidden; }
        #game { width: 600px; height: 200px; border-bottom: 5px solid #4CAF50; position: relative; overflow: hidden; background: rgba(255,255,255,0.3); }
        #sheep { position: absolute; bottom: 0; left: 50px; font-size: 40px; transition: bottom 0.1s; z-index: 2; }
        .poop { position: absolute; bottom: 5px; right: -50px; font-size: 30px; }
        .jump { animation: jump 0.5s ease-out; }
        @keyframes jump { 0% { bottom: 0; } 50% { bottom: 120px; } 100% { bottom: 0; } }
    </style>
</head>
<body>
    <h1>SHEEP JUMP ADVENTURE</h1>
    <div id="game">
        <div id="sheep">🐑</div>
    </div>
    <p>Нажми пробел, чтобы перепрыгнуть через 💩</p>
    <script>
        const sheep = document.getElementById('sheep');
        const game = document.getElementById('game');
        let jumping = false;
        function jump() {
            if (jumping) return;
            jumping = true;
            sheep.classList.add('jump');
            setTimeout(() => { sheep.classList.remove('jump'); jumping = false; }, 500);
        }
        document.addEventListener('keydown', (e) => { if (e.code === 'Space') jump(); });
        function spawnPoop() {
            const poop = document.createElement('div');
            poop.className = 'poop';
            poop.innerText = '💩';
            game.appendChild(poop);
            let pos = -50;
            const move = setInterval(() => {
                pos += 7;
                poop.style.right = pos + 'px';
                const rect = poop.getBoundingClientRect();
                const sheepRect = sheep.getBoundingClientRect();
                if (rect.left < sheepRect.right && rect.right > sheepRect.left && !jumping) {
                    alert('Ой! Овечка вляпалась!');
                    location.reload();
                }
                if (pos > 600) { poop.remove(); clearInterval(move); }
            }, 20);
        }
        setInterval(spawnPoop, 1500);
    </script>
</body>
</html>
