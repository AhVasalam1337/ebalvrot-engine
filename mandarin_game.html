<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Мандаринка Game</title>
    <style>
        body { background: #fff3e0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; overflow: hidden; }
        canvas { background: #ffe0b2; border: 4px solid #f57c00; cursor: none; }
        #score { font-size: 24px; color: #e65100; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="score">Мандаринок собрано: 0</div>
    <canvas id="gameCanvas" width="400" height="500"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        let score = 0;
        let basketX = 175;
        let drop = { x: Math.random() * 380, y: 0 };

        function draw() {
            ctx.clearRect(0, 0, 400, 500);
            // Мандаринка
            ctx.fillStyle = '#ff9800';
            ctx.beginPath();
            ctx.arc(drop.x, drop.y, 15, 0, Math.PI * 2);
            ctx.fill();
            // Корзина
            ctx.fillStyle = '#795548';
            ctx.fillRect(basketX, 450, 50, 30);

            drop.y += 5;
            if (drop.y > 500) { drop.y = 0; drop.x = Math.random() * 380; }
            if (drop.y > 450 && drop.x > basketX && drop.x < basketX + 50) {
                score++;
                scoreEl.innerText = `Мандаринок собрано: ${score}`;
                drop.y = 0; drop.x = Math.random() * 380;
            }
            requestAnimationFrame(draw);
        }

        window.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            basketX = e.clientX - rect.left - 25;
        });

        draw();
    </script>
</body>
</html>
