<!DOCTYPE html>
<html lang='ru'>
<head>
    <meta charset='UTF-8'>
    <title>Каки-Пуки Мастер</title>
    <style>
        body { text-align: center; font-family: sans-serif; background: #f0e68c; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .emoji { font-size: 150px; cursor: pointer; transition: transform 0.2s; display: inline-block; }
        .emoji:hover { transform: scale(1.2); }
        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0) rotate(-10deg); }
            20%, 80% { transform: translate3d(2px, 0, 0) rotate(10deg); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0) rotate(-10deg); }
            40%, 60% { transform: translate3d(4px, 0, 0) rotate(10deg); }
        }
    </style>
</head>
<body>
    <h1>Игра: Каки-Пуки</h1>
    <div class='emoji' id='kaka' onclick='fart()'>💩</div>
    <p>Нажми на кучку, чтобы услышать пук!</p>

    <script>
        function fart() {
            const el = document.getElementById('kaka');
            el.classList.remove('shake');
            void el.offsetWidth;
            el.classList.add('shake');
            alert("ПИЗДЕЦ КАК ПУКНУЛО!");
        }
    </script>
</body>
</html>
