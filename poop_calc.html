<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>какашки</title>
    <style>
        body { background: #1a1a1a; color: #d4a373; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .calc-box { border: 2px solid #d4a373; padding: 30px; text-align: center; box-shadow: 0 0 20px #d4a373; }
        input { background: #333; border: 1px solid #d4a373; color: #fff; padding: 10px; margin: 10px; width: 200px; }
        button { background: #d4a373; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        #result { margin-top: 20px; font-size: 1.2em; }
    </style>
</head>
<body>
    <div class="calc-box">
        <h1>КАЛЬКУЛЯТОР КАКАШЕК</h1>
        <input type="number" id="weight" placeholder="Твой вес (кг)">
        <button onclick="calculate()">РАССЧИТАТЬ</button>
        <div id="result"></div>
    </div>
    <script>
        function calculate() {
            const weight = document.getElementById('weight').value;
            if (!weight) return;
            const output = (weight * 0.002).toFixed(3);
            document.getElementById('result').innerHTML = 
                `Примерный суточный объем: <b>${output} кг</b>💩<br><small>Точность: ДИВАННАЯ</small>`;
        }
    </script>
</body>
</html>
