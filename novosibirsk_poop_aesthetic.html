<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mandarin Rain Pro</title>
    <style>
        body { background: #ff7e5f; background: linear-gradient(135deg, #ff7e5f 0%, #feb47b 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: 'Arial Black', sans-serif; overflow: hidden; touch-action: none; }
        canvas { background: rgba(255, 255, 255, 0.2); border: 4px solid #fff; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        #score { font-size: 28px; color: white; margin-bottom: 20px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
    <div id="score">Мандаринок: 0</div>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        
        canvas.width = window.innerWidth * 0.9;
        canvas.height = window.innerHeight * 0.7;
        
        let score = 0, basketX = canvas.width/2 - 25;
        let drop = { x: Math.random() * (canvas.width - 30) + 15, y: 0 };

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ff9800';
            ctx.beginPath();
            ctx.arc(drop.x, drop.y, 20, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#5d4037';
            ctx.fillRect(basketX, canvas.height - 50, 70, 20);

            drop.y += 7;
            if (drop.y > canvas.height) { drop.y = 0; drop.x = Math.random() * (canvas.width - 30) + 15; }
            if (drop.y > canvas.height - 70 && drop.x > basketX && drop.x < basketX + 70) {
                score++;
                scoreEl.innerText = `Мандаринок: ${score}`;
                drop.y = 0; drop.x = Math.random() * (canvas.width - 30) + 15;
            }
            requestAnimationFrame(draw);
        }

        function move(e) {
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const rect = canvas.getBoundingClientRect();
            basketX = clientX - rect.left - 35;
        }

        window.addEventListener('mousemove', move);
        window.addEventListener('touchmove', move, { passive: false });
        draw();
    </script>
</body>
</html>
