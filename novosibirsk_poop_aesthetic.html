<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Avocado Toast Rain</title>
    <style>
        body { background: #e8f5e9; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; overflow: hidden; touch-action: none; }
        canvas { background: #fff; border: 4px solid #81c784; border-radius: 20px; }
        #score { font-size: 28px; color: #2e7d32; margin-bottom: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="score">Тостов собрано: 0</div>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth * 0.9; canvas.height = window.innerHeight * 0.6;
        let score = 0, basketX = canvas.width/2 - 40, toast = { x: 50, y: 0 }, particles = [];

        function createExplosion(x, y) {
            for(let i=0; i<20; i++) particles.push({ x, y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, alpha: 1 });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.font = '40px serif';
            ctx.fillText('🥑🍞', toast.x, toast.y);
            ctx.fillStyle = '#8d6e63';
            ctx.fillRect(basketX, canvas.height - 40, 80, 20);

            toast.y += 6;
            if(toast.y > canvas.height) { toast.y = 0; toast.x = Math.random()*(canvas.width-50); }
            if(toast.y > canvas.height - 60 && toast.x > basketX - 20 && toast.x < basketX + 60) {
                createExplosion(toast.x, toast.y);
                score++; document.getElementById('score').innerText = `Тостов собрано: ${score}`;
                toast.y = 0; toast.x = Math.random()*(canvas.width-50);
            }
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.alpha -= 0.05;
                ctx.fillStyle = `rgba(255, 255, 255, ${p.alpha})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, Math.PI*2); ctx.fill();
                if(p.alpha <= 0) particles.splice(i, 1);
            });
            requestAnimationFrame(draw);
        }
        window.addEventListener('touchmove', e => { basketX = e.touches[0].clientX - canvas.offsetLeft - 40; }, {passive: false});
        window.addEventListener('mousemove', e => { basketX = e.clientX - canvas.offsetLeft - 40; });
        draw();
    </script>
</body>
</html>
