<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Avocado Toast Sky</title>
    <style>
        body { background: #ffcce0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; overflow: hidden; touch-action: none; }
        canvas { background: #ffebf3; border: 4px solid #ff66b2; border-radius: 20px; box-shadow: 0 0 20px rgba(255,102,178,0.3); }
        #score { font-size: 32px; color: #cc0066; margin-bottom: 20px; text-shadow: 1px 1px #fff; }
    </style>
</head>
<body>
    <div id="score">Тостов: 0</div>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const img = new Image();
        img.src = 'https://i.imgur.com/1dt8ZmQ.png';
        canvas.width = window.innerWidth * 0.9; canvas.height = window.innerHeight * 0.6;
        
        let score = 0, basketX = canvas.width/2 - 40, toast = { x: 50, y: 0 }, particles = [];

        function createExplosion(x, y) {
            for(let i=0; i<15; i++) particles.push({ x, y, vx: (Math.random()-0.5)*15, vy: (Math.random()-0.5)*15, alpha: 1 });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, toast.x, toast.y, 60, 60);
            ctx.fillStyle = '#8d6e63';
            ctx.fillRect(basketX, canvas.height - 40, 80, 20);

            toast.y += 5;
            if(toast.y > canvas.height) { toast.y = 0; toast.x = Math.random()*(canvas.width-60); }
            if(toast.y > canvas.height - 70 && toast.x > basketX - 30 && toast.x < basketX + 60) {
                createExplosion(toast.x+30, toast.y+30);
                score++; document.getElementById('score').innerText = `Тостов: ${score}`;
                toast.y = 0; toast.x = Math.random()*(canvas.width-60);
            }
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.alpha -= 0.03;
                ctx.fillStyle = `rgba(255, 255, 255, ${p.alpha})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, 12, 0, Math.PI*2); ctx.fill();
                if(p.alpha <= 0) particles.splice(i, 1);
            });
            requestAnimationFrame(draw);
        }
        window.addEventListener('touchmove', e => { basketX = e.touches[0].clientX - canvas.offsetLeft - 40; }, {passive: false});
        window.addEventListener('mousemove', e => { basketX = e.clientX - canvas.offsetLeft - 40; });
        img.onload = draw;
    </script>
</body>
</html>
