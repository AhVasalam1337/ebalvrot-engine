<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: #fff; font-family: sans-serif; }
        #poop { font-size: 100px; cursor: pointer; transition: transform 0.1s; }
        @keyframes walk { 0%, 100% { transform: translateY(0) rotate(-5deg); } 50% { transform: translateY(-20px) rotate(5deg); } }
        .walking { animation: walk 0.5s infinite; }
    </style>
</head>
<body>
    <div id="poop" class="walking">💩</div>
    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function fart() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(40, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.connect(gain).connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }
        document.getElementById('poop').addEventListener('click', () => { fart(); });
    </script>
</body>
</html>
